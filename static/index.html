<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journalist's Alpha Copilot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col">
    <header class="bg-blue-900 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">Journalist's Alpha Copilot</h1>
        <button onclick="resetThread()" class="bg-blue-700 hover:bg-blue-600 px-4 py-2 rounded text-sm">New Story</button>
    </header>
    
    <main class="flex-1 overflow-y-auto p-4 max-w-4xl mx-auto w-full" id="chat-container">
        <div class="text-center text-gray-500 my-10" id="empty-state">
            <p>Ask me about insider buys, bulk deals, or chart breakouts.</p>
            <div class="mt-4 flex flex-wrap justify-center gap-2">
                <button onclick="setInput('Show me insider buys above 5 crore in the last 7 days.')" class="bg-white border border-gray-300 rounded px-3 py-1 text-sm hover:bg-gray-50">Insider Buys</button>
                <button onclick="setInput('Any bulk deals today worth more than 20 crore?')" class="bg-white border border-gray-300 rounded px-3 py-1 text-sm hover:bg-gray-50">Bulk Deals</button>
                <button onclick="setInput('Which stocks broke out to a 52-week high yesterday?')" class="bg-white border border-gray-300 rounded px-3 py-1 text-sm hover:bg-gray-50">Breakouts</button>
            </div>
        </div>
        <div id="messages" class="space-y-4"></div>
    </main>
    
    <footer class="bg-white p-4 border-t">
        <div class="max-w-4xl mx-auto flex gap-2">
            <input type="text" id="user-input" class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500" placeholder="Type your query here..." onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="sendMessage()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 font-medium">Send</button>
        </div>
    </footer>

    <script>
        let threadId = sessionStorage.getItem('thread_id');
        
        function resetThread() {
            sessionStorage.removeItem('thread_id');
            threadId = null;
            document.getElementById('messages').innerHTML = '';
            document.getElementById('empty-state').style.display = 'block';
            enableInput();
        }

        function setInput(text) {
            document.getElementById('user-input').value = text;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function appendMessage(role, content, isHtml = false) {
            document.getElementById('empty-state').style.display = 'none';
            const msgDiv = document.createElement('div');
            msgDiv.className = `p-4 rounded-lg ${role === 'user' ? 'bg-blue-100 ml-auto max-w-[80%]' : 'bg-white border border-gray-200 mr-auto max-w-[90%]'} shadow-sm`;
            
            if (isHtml) {
                msgDiv.innerHTML = content;
            } else {
                msgDiv.textContent = content;
            }
            
            document.getElementById('messages').appendChild(msgDiv);
            document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
            return msgDiv;
        }

        function disableInput() {
            document.getElementById('user-input').disabled = true;
            document.getElementById('send-btn').disabled = true;
            document.getElementById('send-btn').classList.add('opacity-50');
        }

        function enableInput() {
            document.getElementById('user-input').disabled = false;
            document.getElementById('send-btn').disabled = false;
            document.getElementById('send-btn').classList.remove('opacity-50');
            document.getElementById('user-input').focus();
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) return;

            appendMessage('user', message);
            input.value = '';
            disableInput();

            const loadingId = 'loading-' + Date.now();
            const loadingDiv = appendMessage('agent', 'Agent is researching...', false);
            loadingDiv.id = loadingId;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, thread_id: threadId })
                });
                
                const data = await res.json();
                document.getElementById(loadingId).remove();

                if (data.error) {
                    appendMessage('agent', `Error: ${data.error}`);
                    enableInput();
                    return;
                }

                threadId = data.thread_id;
                sessionStorage.setItem('thread_id', threadId);

                if (data.status === 'awaiting_approval') {
                    showApprovalCard(data.analysis, data.preview);
                } else if (data.status === 'complete') {
                    appendMessage('agent', marked.parse(data.response), true);
                    enableInput();
                }
            } catch (err) {
                document.getElementById(loadingId).remove();
                appendMessage('agent', `Failed to connect to server: ${err.message}`);
                enableInput();
            }
        }

        function showApprovalCard(analysis, previewData) {
            const cardHtml = `
                <div class="space-y-3" id="approval-card-${threadId}">
                    <h3 class="font-bold text-lg text-gray-800">Research Complete. Awaiting Approval.</h3>
                    <div class="bg-gray-50 p-3 rounded border text-sm text-gray-700 whitespace-pre-wrap">${analysis}</div>
                    ${previewData && previewData.length > 0 ? `
                    <div class="text-xs text-gray-500 mt-2">Preview of raw data:</div>
                    <pre class="bg-gray-800 text-green-400 p-2 rounded text-xs overflow-x-auto">${JSON.stringify(previewData, null, 2)}</pre>
                    ` : ''}
                    <div class="flex gap-2 mt-4">
                        <button onclick="submitApproval('approve')" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded font-medium">Approve & Generate Report</button>
                        <button onclick="submitApproval('reject')" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded font-medium">Reject</button>
                    </div>
                </div>
            `;
            appendMessage('agent', cardHtml, true);
        }

        async function submitApproval(action) {
            const card = document.getElementById(`approval-card-${threadId}`);
            if (card) {
                card.innerHTML = `<div class="text-gray-600 italic">Processing ${action}...</div>`;
            }

            try {
                const res = await fetch(`/api/approve/${threadId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action })
                });
                
                const data = await res.json();
                
                if (data.error) {
                    appendMessage('agent', `Error: ${data.error}`);
                } else if (data.status === 'complete') {
                    appendMessage('agent', marked.parse(data.response), true);
                } else if (data.status === 'rejected') {
                    appendMessage('agent', 'Report rejected. You can start a new query.');
                }
            } catch (err) {
                appendMessage('agent', `Failed to submit approval: ${err.message}`);
            }
            enableInput();
        }
    </script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAm2sPcqn2kjMK7CzfeStOWo9rQ24B6TWA",
            authDomain: "infiniquant-da402.firebaseapp.com",
            projectId: "infiniquant-da402",
            storageBucket: "infiniquant-da402.firebasestorage.app",
            messagingSenderId: "608512799755",
            appId: "1:608512799755:web:a6d88dc29b86326f66c30e",
            measurementId: "G-DVGLSBBGZ4"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
    </script>
</body>
</html>
